{% extends 'shop/base.html' %}

{% block content %}
    <div class="card p-4">
        <h2>{{ product.name }}</h2>
        <hr>
        <p><strong>Описание:</strong> {{ product.description }}</p>
        <p><strong>Цена:</strong> {{ product.price }} ₽</p>
        <a href="{% url 'product_list' %}" class="btn btn-secondary">Назад</a>
    </div>
{% endblock %}
