name: Django Tests CI

# Триггеры: когда запускать тесты
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    # 1. Скачиваем код
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Устанавливаем Python
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. Устанавливаем зависимости
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-django coverage pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Применяем миграции (создаем тестовую БД)
    - name: Apply migrations
      run: |
        python manage.py makemigrations
        python manage.py migrate

    # 5. Запускаем тесты с pytest
    - name: Run tests with pytest
      run: |
        pytest -v

    # 6. Запускаем тесты с замером покрытия (БОНУС)
    - name: Generate coverage report
      run: |
        pytest --cov=shop --cov-report=term-missing --cov-report=xml
      continue-on-error: true

    # 7. Отправка покрытия в Codecov (БОНУС)
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false