<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить запись</title>
    <style>body{font-family:sans-serif;max-width:500px;margin:2rem auto;padding:0 1rem;}</style>
</head>
<body>
    <h1>📝 Новая запись</h1>
    <form method="POST">
        <label>Название:<br><input type="text" name="title" required style="width:100%;padding:0.5rem;"></label><br><br>
        <label>Описание:<br><textarea name="description" rows="4" style="width:100%;padding:0.5rem;"></textarea></label><br><br>
        <button type="submit" style="padding:0.5rem 1rem;">Сохранить</button>
    </form>
    <br>
    <a href="/">← Вернуться к списку</a>
</body>
</html>
